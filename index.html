<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>egakareta</title>
        <link rel="icon" type="image/png" href="assets/favicon.png" />
        <style>
            html,
            body {
                background-color: black;
                margin: 0;
                padding: 0;
                overflow: hidden;
                width: 100vw;
                height: 100vh;
                position: fixed;
                top: 0;
                left: 0;
                font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            }

            canvas {
                display: block;
                width: 100vw;
                height: 100vh;
                user-select: none;
                -webkit-user-drag: none;
                -khtml-user-drag: none;
                -moz-user-drag: none;
                -o-user-drag: none;
            }

            #loading {
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                color: white;
                font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 10px;
                z-index: 1000;
            }

            .progress-bar {
                width: 300px;
                height: 10px;
                background: rgba(255, 255, 255, 0.2);
                border-radius: 5px;
                overflow: hidden;
            }

            .progress-fill {
                width: 0%;
                height: 100%;
                background: #00f2ff;
                transition: width 0.1s;
            }

            #error {
                position: fixed;
                top: 20px;
                left: 20px;
                background: rgba(255, 0, 0, 0.8);
                color: white;
                padding: 10px;
                border-radius: 5px;
                display: none;
                z-index: 1000;
            }

            .block-option {
                width: 50px;
                height: 50px;
                border-radius: 5px;
                cursor: pointer;
                border: 2px solid transparent;
                transition:
                    transform 0.1s,
                    border-color 0.1s;
                display: flex;
                align-items: center;
                justify-content: center;
                color: white;
                font-size: 10px;
                text-align: center;
                background-size: cover;
            }

            .block-option:hover {
                transform: scale(1.1);
                border-color: rgba(255, 255, 255, 0.5);
            }

            .block-option.selected {
                border-color: #00f2ff;
                box-shadow: 0 0 10px #00f2ff;
            }

            .block-label {
                pointer-events: none;
                background: rgba(0, 0, 0, 0.5);
                padding: 2px 4px;
                border-radius: 3px;
            }
        </style>
    </head>

    <body>
        <div id="loading">
            <div id="loading-text">loading...</div>
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
        </div>
        <div id="error"></div>
        <canvas id="gameCanvas"></canvas>

        <script type="module">
            console.log("modulescript loaded");
            const loading = document.getElementById("loading");
            const loadingText = document.getElementById("loading-text");
            const progressBar = document.querySelector(".progress-fill");
            const errorDiv = document.getElementById("error");

            const fetchMultipleWithProgress = async (urls) => {
                const responses = await Promise.all(
                    urls.map((url) => fetch(url)),
                );
                let total = 0;
                let loaded = 0;

                responses.forEach((res) => {
                    const contentLength = res.headers.get("Content-Length");
                    if (contentLength) {
                        total += parseInt(contentLength, 10);
                    }
                });

                const streams = responses.map((res) => {
                    const stream = new ReadableStream({
                        async start(controller) {
                            const reader = res.body.getReader();
                            while (true) {
                                const { done, value } = await reader.read();
                                if (done) break;
                                loaded += value.byteLength;
                                if (total) {
                                    const percent = Math.min(
                                        100,
                                        Math.round((loaded / total) * 100),
                                    );
                                    progressBar.style.width = `${percent}%`;
                                    loadingText.textContent = `loading... ${percent}%`;
                                }
                                controller.enqueue(value);
                            }
                            controller.close();
                        },
                    });

                    return new Response(stream, {
                        headers: {
                            "content-type":
                                res.headers.get("content-type") ||
                                "application/octet-stream",
                        },
                    });
                });

                return streams;
            };

            const installWebGpuLimitsCompat = () => {
                const gpu = navigator.gpu;
                if (!gpu) return;
                const proto = Object.getPrototypeOf(
                    globalThis.GPUAdapter?.prototype ?? {},
                );
                const adapterProto = globalThis.GPUAdapter?.prototype ?? proto;
                if (
                    !adapterProto ||
                    adapterProto.__egakaretaRequestDevicePatched
                )
                    return;

                const originalRequestDevice = adapterProto.requestDevice;
                if (typeof originalRequestDevice !== "function") return;

                const limitNameMap = {
                    maxInterStageShaderComponents:
                        "maxInterStageShaderVariables",
                };

                adapterProto.requestDevice = function patchedRequestDevice(
                    descriptor = {},
                ) {
                    const limits = descriptor?.requiredLimits;
                    if (!limits || typeof limits !== "object") {
                        return originalRequestDevice.call(this, descriptor);
                    }

                    const normalizedLimits = {};
                    for (const [key, value] of Object.entries(limits)) {
                        const mappedKey = limitNameMap[key] ?? key;
                        normalizedLimits[mappedKey] = value;
                    }

                    return originalRequestDevice.call(this, {
                        ...descriptor,
                        requiredLimits: normalizedLimits,
                    });
                };

                Object.defineProperty(
                    adapterProto,
                    "__egakaretaRequestDevicePatched",
                    {
                        value: true,
                        enumerable: false,
                        configurable: false,
                        writable: false,
                    },
                );
            };

            try {
                console.log("starting to load");
                installWebGpuLimitsCompat();
                console.log("webgpu limits compatibility patch installed");

                // Fetch both JS and WASM with a combined progress bar
                const [jsResponse, wasmResponse] =
                    await fetchMultipleWithProgress([
                        "./pkg/egakareta_lib.js",
                        "./pkg/egakareta_lib_bg.wasm",
                    ]);
                console.log("both js and wasm fetched");

                // Create an object URL for the JS module so we can import it dynamically
                const jsBlob = await jsResponse.blob();
                const jsUrl = URL.createObjectURL(
                    new Blob([jsBlob], { type: "text/javascript" }),
                );

                // Import the WebAssembly module
                const { default: init, run_game } = await import(jsUrl);

                // Clean up the object URL
                URL.revokeObjectURL(jsUrl);

                console.log("wasm module imported");

                // Initialize WebAssembly
                await init(wasmResponse);

                console.log("wasm module initialized");

                // Run the game
                await run_game("gameCanvas");

                // Hide loading and start the game
                loading.style.display = "none";
            } catch (error) {
                console.error("Failed to load:", error);
                loading.style.display = "none";
                errorDiv.style.display = "block";
                errorDiv.textContent = `error: ${error.message}`;
            }
        </script>
    </body>
</html>
