<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Line Dash</title>
        <link rel="icon" type="image/png" href="assets/favicon.png" />
        <style>
            html,
            body {
                margin: 0;
                padding: 0;
                overflow: hidden;
                width: 100vw;
                height: 100vh;
                position: fixed;
                top: 0;
                left: 0;
                font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            }

            canvas {
                display: block;
                width: 100vw;
                height: 100vh;
                user-select: none;
                -webkit-user-drag: none;
                -khtml-user-drag: none;
                -moz-user-drag: none;
                -o-user-drag: none;
            }

            #loading {
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                color: white;
                font-size: 18px;
                text-align: center;
                z-index: 1000;
            }

            #error {
                position: fixed;
                top: 20px;
                left: 20px;
                background: rgba(255, 0, 0, 0.8);
                color: white;
                padding: 10px;
                border-radius: 5px;
                display: none;
                z-index: 1000;
            }

            .block-option {
                width: 50px;
                height: 50px;
                border-radius: 5px;
                cursor: pointer;
                border: 2px solid transparent;
                transition:
                    transform 0.1s,
                    border-color 0.1s;
                display: flex;
                align-items: center;
                justify-content: center;
                color: white;
                font-size: 10px;
                text-align: center;
                background-size: cover;
            }

            .block-option:hover {
                transform: scale(1.1);
                border-color: rgba(255, 255, 255, 0.5);
            }

            .block-option.selected {
                border-color: #00f2ff;
                box-shadow: 0 0 10px #00f2ff;
            }

            .block-label {
                pointer-events: none;
                background: rgba(0, 0, 0, 0.5);
                padding: 2px 4px;
                border-radius: 3px;
            }
        </style>
    </head>

    <body>
        <div id="loading">Loading...</div>
        <div id="error"></div>
        <canvas id="gameCanvas"></canvas>

        <script type="module">
            const loading = document.getElementById("loading");
            const errorDiv = document.getElementById("error");

            const installWebGpuLimitsCompat = () => {
                const gpu = navigator.gpu;
                if (!gpu) return;
                const proto = Object.getPrototypeOf(
                    globalThis.GPUAdapter?.prototype ?? {},
                );
                const adapterProto = globalThis.GPUAdapter?.prototype ?? proto;
                if (
                    !adapterProto ||
                    adapterProto.__lineDashRequestDevicePatched
                )
                    return;

                const originalRequestDevice = adapterProto.requestDevice;
                if (typeof originalRequestDevice !== "function") return;

                const limitNameMap = {
                    maxInterStageShaderComponents:
                        "maxInterStageShaderVariables",
                };

                adapterProto.requestDevice = function patchedRequestDevice(
                    descriptor = {},
                ) {
                    const limits = descriptor?.requiredLimits;
                    if (!limits || typeof limits !== "object") {
                        return originalRequestDevice.call(this, descriptor);
                    }

                    const normalizedLimits = {};
                    for (const [key, value] of Object.entries(limits)) {
                        const mappedKey = limitNameMap[key] ?? key;
                        normalizedLimits[mappedKey] = value;
                    }

                    return originalRequestDevice.call(this, {
                        ...descriptor,
                        requiredLimits: normalizedLimits,
                    });
                };

                Object.defineProperty(
                    adapterProto,
                    "__lineDashRequestDevicePatched",
                    {
                        value: true,
                        enumerable: false,
                        configurable: false,
                        writable: false,
                    },
                );
            };

            try {
                installWebGpuLimitsCompat();

                // Import the WebAssembly module
                const { default: init, run_game } =
                    await import("./pkg/line_dash_lib.js");

                // Initialize WebAssembly
                await init();

                // Run the game
                await run_game("gameCanvas");

                // Hide loading and start the game
                loading.style.display = "none";
            } catch (error) {
                console.error("Failed to load:", error);
                loading.style.display = "none";
                errorDiv.style.display = "block";
                errorDiv.textContent = `Error: ${error.message}`;
            }
        </script>
    </body>
</html>
