<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>egakareta</title>
        <link rel="icon" type="image/png" href="assets/favicon.png" />
        <style>
            html,
            body {
                background-color: black;
                margin: 0;
                padding: 0;
                overflow: hidden;
                width: 100vw;
                height: 100vh;
                position: fixed;
                top: 0;
                left: 0;
                font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            }

            canvas {
                display: block;
                user-select: none;
                -webkit-user-drag: none;
                -khtml-user-drag: none;
                -moz-user-drag: none;
                -o-user-drag: none;
            }

            #loading {
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                color: white;
                font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 10px;
                z-index: 1000;
            }

            #splash {
                position: fixed;
                inset: 0;
                display: none;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                background: #020202;
                z-index: 2000;
                color: white;
            }

            #firefox-warning {
                display: none;
                margin-top: 8px;
                padding: 10px 14px;
                max-width: min(90vw, 620px);
                border: 1px solid rgba(255, 255, 255, 0.35);
                background: rgba(255, 66, 66, 0.2);
                color: #ffd9d9;
                text-align: center;
                font-size: 14px;
            }

            .progress-bar {
                width: 300px;
                height: 10px;
                background: rgba(255, 255, 255, 0.2);
                overflow: hidden;
            }

            .progress-fill {
                width: 0%;
                height: 100%;
                background: #ffffff;
                transition: width 0.1s;
            }

            #error {
                position: fixed;
                top: 20px;
                left: 20px;
                background: rgba(255, 0, 0, 0.8);
                color: white;
                padding: 10px;
                border-radius: 5px;
                display: none;
                z-index: 1000;
            }

            .block-option {
                width: 50px;
                height: 50px;
                border-radius: 5px;
                cursor: pointer;
                border: 2px solid transparent;
                transition:
                    transform 0.1s,
                    border-color 0.1s;
                display: flex;
                align-items: center;
                justify-content: center;
                color: white;
                font-size: 10px;
                text-align: center;
                background-size: cover;
            }

            .block-option:hover {
                transform: scale(1.1);
                border-color: rgba(255, 255, 255, 0.5);
            }

            .block-option.selected {
                border-color: #00f2ff;
                box-shadow: 0 0 10px #00f2ff;
            }

            .block-label {
                pointer-events: none;
                background: rgba(0, 0, 0, 0.5);
                padding: 2px 4px;
                border-radius: 3px;
            }
        </style>
    </head>

    <body>
        <div id="splash">
            <img
                width="100"
                class="splash-logo"
                src="assets/favicon.png"
                alt="egakareta Logo"
            />
            <p>click anywhere to start</p>
            <div id="firefox-warning">
                firefox is not recommended due to performance issues :( please
                use chrome or edge for the best experience
            </div>
        </div>
        <div id="loading">
            <div id="loading-text">loading...</div>
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
        </div>
        <div id="error"></div>
        <canvas id="gameCanvas"></canvas>

        <script type="module">
            console.log("modulescript loaded");
            window.__EGAKARETA_LAUNCH_READY = false;
            window.__EGAKARETA_LAUNCH_ERROR = null;

            const loading = document.getElementById("loading");
            const loadingText = document.getElementById("loading-text");
            const progressBar = document.querySelector(".progress-fill");
            const errorDiv = document.getElementById("error");
            const splash = document.getElementById("splash");
            const firefoxWarning = document.getElementById("firefox-warning");

            const userAgent = navigator.userAgent || "";
            const isFirefox = /firefox/i.test(userAgent);
            if (isFirefox && firefoxWarning) {
                firefoxWarning.style.display = "block";
            }

            let run_game_fn = null;

            const fetchMultipleWithProgress = async (urls) => {
                const responses = await Promise.all(
                    urls.map((url) => fetch(url)),
                );
                let total = 0;
                let loaded = 0;
                const startTime = performance.now();

                responses.forEach((res) => {
                    const contentLength =
                        res.headers.get("x-wasm-content-length") ||
                        res.headers.get("Content-Length");
                    const parsedLength = Number(contentLength);
                    if (Number.isFinite(parsedLength) && parsedLength > 0) {
                        total += parsedLength;
                    }
                });

                const streams = responses.map((res) => {
                    const stream = new ReadableStream({
                        async start(controller) {
                            const reader = res.body.getReader();
                            while (true) {
                                const { done, value } = await reader.read();
                                if (done) break;
                                loaded += value.byteLength;
                                if (total) {
                                    const percent = Math.min(
                                        100,
                                        Math.round((loaded / total) * 100),
                                    );
                                    progressBar.style.width = `${percent}%`;

                                    const loadedMB = (
                                        loaded /
                                        (1024 * 1024)
                                    ).toFixed(1);
                                    const totalMB = (
                                        total /
                                        (1024 * 1024)
                                    ).toFixed(1);
                                    const elapsed =
                                        (performance.now() - startTime) / 1000;
                                    let timeText = "";
                                    if (elapsed > 0.5 && loaded > 0) {
                                        const speed = loaded / elapsed;
                                        const remaining = Math.max(
                                            0,
                                            (total - loaded) / speed,
                                        );
                                        if (
                                            Number.isFinite(remaining) &&
                                            remaining > 0
                                        ) {
                                            timeText = ` (${Math.ceil(remaining)}s left)`;
                                        }
                                    }
                                    loadingText.textContent = `loading... ${loadedMB}/${totalMB} MB${timeText}`;
                                } else {
                                    const loadedMB = (
                                        loaded /
                                        (1024 * 1024)
                                    ).toFixed(1);
                                    loadingText.textContent = `loading... ${loadedMB} MB`;
                                }
                                controller.enqueue(value);
                            }
                            controller.close();
                        },
                    });

                    return new Response(stream, {
                        headers: {
                            "content-type":
                                res.headers.get("content-type") ||
                                "application/octet-stream",
                        },
                    });
                });

                return streams;
            };

            const init_wasm = async () => {
                try {
                    console.log("importing js");
                    const { default: init, run_game } =
                        await import("./pkg/egakareta_lib.js");
                    run_game_fn = run_game;

                    console.log("fetching wasm");
                    const [wasmResponse] = await fetchMultipleWithProgress([
                        "./pkg/egakareta_lib_bg.wasm",
                    ]);

                    // Initialize WebAssembly
                    console.log("initializing wasm");
                    await init(wasmResponse);

                    console.log("isolated:", self.crossOriginIsolated);

                    // Show splash and hide loading
                    loading.style.display = "none";
                    if (splash) {
                        splash.style.display = "flex";
                    }
                } catch (error) {
                    console.error("Failed to load:", error);
                    window.__EGAKARETA_LAUNCH_ERROR =
                        error?.message ?? String(error);
                    loading.style.display = "none";
                    errorDiv.style.display = "block";
                    errorDiv.textContent = `error: ${error.message}`;
                }
            };

            splash?.addEventListener(
                "click",
                async (event) => {
                    event.preventDefault();
                    event.stopPropagation();
                    if (splash) {
                        splash.style.display = "none";
                    }

                    if (run_game_fn) {
                        console.log("starting game");
                        try {
                            await run_game_fn("gameCanvas");
                        } catch (error) {
                            console.error("Failed to run game:", error);
                            window.__EGAKARETA_LAUNCH_ERROR =
                                error?.message ?? String(error);
                            errorDiv.style.display = "block";
                            errorDiv.textContent = `error: ${window.__EGAKARETA_LAUNCH_ERROR}`;
                        }
                    }
                },
                { once: true },
            );

            // Start loading immediately
            init_wasm();
        </script>
    </body>
</html>
