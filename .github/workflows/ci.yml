name: CI/CD

on:
  push:
    branches: ["main"]
    tags:
      - "v*"
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  checks:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    environment: preview
    env:
      API_URL: ${{ vars.API_URL }}
      PUBLISHABLE_KEY: ${{ vars.PUBLISHABLE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy, rustfmt, rust-src
      - uses: Swatinem/rust-cache@v2
      - uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libasound2-dev libudev-dev pkg-config
          version: 1.0
      - run: bun install
      - run: bun format:cargo -- --check
      - run: bun format:prettier -- --check
      - run: bun lint

  test-rust:
    name: Rust Tests
    runs-on: ubuntu-latest
    environment: preview
    env:
      API_URL: ${{ vars.API_URL }}
      PUBLISHABLE_KEY: ${{ vars.PUBLISHABLE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools-preview, rust-src
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest,cargo-llvm-cov
      - uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libasound2-dev libudev-dev pkg-config
          version: 1.0
      - run: bun install
      - run: bun run test:coverage
      - uses: codecov/codecov-action@v3
        with:
          file: ./lcov.info

  test-db:
    name: Test Database
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bunx supabase start
      - run: bun run test:db

  build-web:
    name: Build WebAssembly
    runs-on: ubuntu-latest
    permissions:
      contents: write
    environment: ${{ github.event_name == 'push' && 'production' || 'preview' }}
    env:
      API_URL: ${{ vars.API_URL }}
      PUBLISHABLE_KEY: ${{ vars.PUBLISHABLE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-unknown-unknown
          components: rust-src
      - uses: Swatinem/rust-cache@v2
      - run: bun install

      - name: Build WebAssembly
        run: bun run build

      - run: zip -r egakareta-web.zip dist

      - uses: softprops/action-gh-release@v1
        continue-on-error: true
        with:
          files: egakareta-web.zip
          draft: true

  build-native:
    name: Build Native (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: egakareta-linux
            binary_path: target/x86_64-unknown-linux-gnu/release/egakareta
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: egakareta-windows
            binary_path: target/x86_64-pc-windows-msvc/release/egakareta.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: egakareta-macos
            binary_path: target/x86_64-apple-darwin/release/egakareta
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    environment: ${{ github.event_name == 'push' && 'production' || 'preview' }}
    env:
      API_URL: ${{ vars.API_URL }}
      PUBLISHABLE_KEY: ${{ vars.PUBLISHABLE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}
          components: rust-src
      - uses: Swatinem/rust-cache@v2
      - if: matrix.os == 'ubuntu-latest'
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libasound2-dev libudev-dev pkg-config
          version: 1.0

      - name: Build ${{ matrix.artifact_name }}
        run: cargo build --release --verbose --target ${{ matrix.target }}

      - if: matrix.os == 'windows-latest'
        run: Compress-Archive -Path ${{ matrix.binary_path }} -DestinationPath ${{ matrix.artifact_name }}.zip
      - if: matrix.os != 'windows-latest'
        run: zip -j ${{ matrix.artifact_name }}.zip ${{ matrix.binary_path }}

      - uses: softprops/action-gh-release@v1
        continue-on-error: true
        with:
          files: ${{ matrix.artifact_name }}.zip
          draft: true
