name: CI/CD

on:
  push:
    branches: ["main"]
    tags:
      - "v*"
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  test-and-build-native:
    name: Test and Build Native
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy, llvm-tools-preview, rustfmt, rust-src

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Install cargo tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest,cargo-llvm-cov

      - name: Install apt packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libasound2-dev libudev-dev pkg-config
          version: 1.0

      - name: Install cross toolchains
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          rustup target add x86_64-pc-windows-gnu x86_64-apple-darwin
          sudo apt-get install -y mingw-w64

      - name: Install dependencies (Bun)
        run: bun install

      - name: Check cargo formatting
        run: bun format:cargo -- --check

      - name: Check prettier formatting
        run: bun format:prettier -- --check

      - name: Lint with clippy
        run: bun lint

      - name: Run tests with coverage
        run: bun run test:coverage

      - name: Build Release (Linux)
        if: startsWith(github.ref, 'refs/tags/')
        run: cargo build --release --verbose --target x86_64-unknown-linux-gnu

      - name: Build Release (Windows)
        if: startsWith(github.ref, 'refs/tags/')
        run: cargo build --release --verbose --target x86_64-pc-windows-gnu

      - name: Build Release (macOS)
        if: startsWith(github.ref, 'refs/tags/')
        run: cargo build --release --verbose --target x86_64-apple-darwin

      - name: Prepare Artifacts
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cp target/x86_64-unknown-linux-gnu/release/egakareta egakareta-linux
          cp target/x86_64-pc-windows-gnu/release/egakareta.exe egakareta-windows.exe
          cp target/x86_64-apple-darwin/release/egakareta egakareta-macos

      - name: Upload Artifacts
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: egakareta-native
          path: |
            egakareta-linux
            egakareta-windows.exe
            egakareta-macos

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./lcov.info

  test-db:
    name: Test Database
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Start Supabase
        run: bunx supabase start

      - name: Run database tests
        run: bun run test:db

  release:
    name: Create Release
    needs: [test-and-build-native, test-db]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: egakareta-*
          merge-multiple: true
          path: artifacts

      - name: List Artifacts
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*
          generate_release_notes: true
