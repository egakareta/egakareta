name: CI/CD

on:
  push:
    branches: ["main"]
    tags:
      - "v*"
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  test-and-build-native:
    name: Test and Build Native (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev pkg-config

      - name: Install dependencies (Bun)
        run: bun install

      - name: Set diagnostic env for Windows tests
        if: runner.os == 'Windows'
        run: |
          echo "RUST_BACKTRACE=1" >> $GITHUB_ENV
          echo "RUST_LOG=wgpu=debug,rodio=debug" >> $GITHUB_ENV

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            bun run test -- --nocapture --test-threads=1
          else
            bun run test --verbose
          fi

      - name: Check cargo formatting
        if: runner.os == 'Linux'
        run: bun format:cargo -- --check

      - name: Check prettier formatting
        if: runner.os == 'Linux'
        run: bun format:prettier -- --check

      - name: Lint with clippy
        if: runner.os == 'Linux'
        run: bun lint

      - name: Build Release
        if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
        run: cargo build --release --verbose

      - name: Prepare Artifact Name
        if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            cp target/release/line-dash.exe line-dash-windows.exe
            echo "ASSET=line-dash-windows.exe" >> $GITHUB_ENV
          elif [ "$RUNNER_OS" == "Linux" ]; then
            cp target/release/line-dash line-dash-linux
            echo "ASSET=line-dash-linux" >> $GITHUB_ENV
          elif [ "$RUNNER_OS" == "macOS" ]; then
            cp target/release/line-dash line-dash-macos
            echo "ASSET=line-dash-macos" >> $GITHUB_ENV
          fi

      - name: Upload Artifact
        if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: line-dash-${{ matrix.os }}
          path: ${{ env.ASSET }}

      - name: Install cargo-tarpaulin
        if: runner.os == 'Linux'
        run: cargo install cargo-tarpaulin

      - name: Generate coverage report
        if: runner.os == 'Linux'
        run: cargo tarpaulin --out Xml

      - name: Upload coverage to Codecov
        if: runner.os == 'Linux'
        uses: codecov/codecov-action@v3
        with:
          file: ./cobertura.xml

  build-wasm:
    name: Build WASM
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev pkg-config

      - name: Install dependencies
        run: bun install

      - name: Build WASM
        run: bun prod

      - name: Setup Pages
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        uses: actions/configure-pages@v4

      - name: Upload artifact
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./dist"

  deploy-pages:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: [test-and-build-native, build-wasm]
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  release:
    name: Create Release
    needs: [test-and-build-native, build-wasm]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: line-dash-*
          merge-multiple: true
          path: artifacts

      - name: List Artifacts
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*
          generate_release_notes: true
