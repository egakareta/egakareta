name: CI/CD

on:
  push:
    branches: ["main"]
    tags:
      - "v*"
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  test-and-build-native:
    name: Test and Build Native
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev pkg-config

      - name: Install cross toolchains
        run: |
          rustup target add x86_64-unknown-linux-gnu x86_64-pc-windows-gnu x86_64-apple-darwin
          sudo apt-get install -y mingw-w64

      - name: Install dependencies (Bun)
        run: bun install

      - name: Install llvm-tools-preview
        run: rustup component add llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: baptiste0928/cargo-install@v3
        with:
          crate: cargo-llvm-cov

      - name: Install cargo-nextest
        uses: baptiste0928/cargo-install@v3
        with:
          crate: cargo-nextest
          locked: true

      - name: Check cargo formatting
        run: bun format:cargo -- --check

      - name: Check prettier formatting
        run: bun format:prettier -- --check

      - name: Lint with clippy
        run: bun lint

      - name: Run tests with coverage
        run: bun run test:coverage

      - name: Build Release (Linux)
        if: startsWith(github.ref, 'refs/tags/')
        run: cargo build --release --verbose --target x86_64-unknown-linux-gnu

      - name: Build Release (Windows)
        if: startsWith(github.ref, 'refs/tags/')
        run: cargo build --release --verbose --target x86_64-pc-windows-gnu

      - name: Build Release (macOS)
        if: startsWith(github.ref, 'refs/tags/')
        run: cargo build --release --verbose --target x86_64-apple-darwin

      - name: Prepare Artifacts
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cp target/x86_64-unknown-linux-gnu/release/line-dash line-dash-linux
          cp target/x86_64-pc-windows-gnu/release/line-dash.exe line-dash-windows.exe
          cp target/x86_64-apple-darwin/release/line-dash line-dash-macos

      - name: Upload Artifacts
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: line-dash-native
          path: |
            line-dash-linux
            line-dash-windows.exe
            line-dash-macos

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./lcov.info

  build-wasm:
    name: Build WASM
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev pkg-config

      - name: Install dependencies
        run: bun install

      - name: Build WASM
        run: bun prod

      - name: Setup Pages
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        uses: actions/configure-pages@v4

      - name: Upload artifact
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./dist"

  deploy-pages:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: [test-and-build-native, build-wasm]
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  release:
    name: Create Release
    needs: [test-and-build-native, build-wasm]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: line-dash-*
          merge-multiple: true
          path: artifacts

      - name: List Artifacts
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*
          generate_release_notes: true
