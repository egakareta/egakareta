name: CI/CD

on:
  push:
    branches: ["main"]
    tags:
      - "v*"
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  checks:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: bun install
      - run: bun format:cargo -- --check
      - run: bun format:prettier -- --check
      - run: bun lint

  test-rust:
    name: Rust Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest,cargo-llvm-cov
      - uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libasound2-dev libudev-dev pkg-config
          version: 1.0
      - run: bun install
      - run: bun run test:coverage
      - uses: codecov/codecov-action@v3
        with:
          file: ./lcov.info

  test-db:
    name: Test Database
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bunx supabase start
      - run: bun run test:db

  build-web:
    name: Build WebAssembly
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-unknown-unknown
          components: rust-src
      - uses: Swatinem/rust-cache@v2
      - run: bun install
      - run: bun run build
      - uses: softprops/action-gh-release@v1
        with:
          files: dist/**/*
          draft: true

  build-native:
    name: Build Native (${{ matrix.os }})
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: egakareta-linux
            binary_path: target/x86_64-unknown-linux-gnu/release/egakareta
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: egakareta-windows.exe
            binary_path: target/x86_64-pc-windows-msvc/release/egakareta.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: egakareta-macos
            binary_path: target/x86_64-apple-darwin/release/egakareta
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}
          components: rust-src
      - uses: Swatinem/rust-cache@v2
      - if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y libasound2-dev libudev-dev pkg-config
      - run: cargo build --release --verbose --target ${{ matrix.target }}
      - uses: softprops/action-gh-release@v1
        with:
          files: ${{ matrix.binary_path }}
          draft: true
