[package]
name = "line-dash"
version = "0.1.0"
edition = "2021"
authors = []
description = "Line Dash game engine prototype"

[lib]
name = "line_dash_lib"
crate-type = ["cdylib", "rlib"]

[dependencies]
console_error_panic_hook = "0.1"
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
wgpu = { version = "22.0.0", default-features = false, features = ["webgl", "wgsl"] }
pollster = "0.3"
env_logger = "0.11"
log = "0.4"
bytemuck = { version = "1.15", features = ["derive"] }
glam = { version = "0.27", features = ["bytemuck"] }
web-sys = { version = "0.3", features = [
    "console",
    "Window",
    "Document",
    "Element",
    "HtmlCanvasElement",
    "EventTarget",
    "Event",
    "MouseEvent",
    "WheelEvent",
    "KeyboardEvent",
    "TouchEvent",
    "TouchList",
    "Touch",
    "Performance",
    "HtmlAudioElement",
    "DomTokenList",
    "HtmlElement",
    "Blob",
    "Url",
] }
js-sys = "0.3"
web-time = "1.1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
include_dir = "0.7"
zip = { version = "2.2", default-features = false, features = ["deflate"] }
base64 = "0.22"
egui = "0.29"
egui-wgpu = "0.29"

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
rodio = { version = "0.20", features = ["symphonia-all"] }
winit = "0.30"
egui-winit = "0.29"

[package.metadata.wasm-pack.profile.release]
wasm-opt = false
