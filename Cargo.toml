[package]
name = "line-dash"
version = "0.1.0"
edition = "2021"
authors = ["evilbocchi"]
description = "Feel the beat, follow the line."
repository = "https://github.com/evilbocchi/line-dash"
license = "MIT"

[lib]
name = "line_dash_lib"
crate-type = ["cdylib", "rlib"]

[dependencies]
console_error_panic_hook = "0.1"
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
wgpu = { version = "22.0.0", features = ["webgpu", "webgl"] }
pollster = "0.3"
env_logger = "0.11"
log = "0.4"
bytemuck = { version = "1.15", features = ["derive"] }
glam = { version = "0.27", features = ["bytemuck"] }
web-sys = { version = "0.3", features = [
    "console",
    "Window",
    "Document",
    "Element",
    "HtmlCanvasElement",
    "EventTarget",
    "Event",
    "MouseEvent",
    "WheelEvent",
    "KeyboardEvent",
    "TouchEvent",
    "TouchList",
    "Touch",
    "Performance",
    "HtmlAudioElement",
    "AudioContext",
    "AudioBuffer",
    "Response",
    "DomTokenList",
    "HtmlElement",
    "Blob",
    "Url",
    "IdbFactory",
    "IdbDatabase",
    "IdbObjectStore",
    "IdbRequest",
    "IdbOpenDbRequest",
    "IdbTransaction",
    "IdbTransactionMode",
    "DomStringList",
] }
js-sys = "0.3"
web-time = "1.1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
include_dir = "0.7"
zip = { version = "2.2", default-features = false, features = ["deflate"] }
base64 = "0.22"
egui = "0.29"
egui-wgpu = "0.29"
rfd = "0.15"
wgpu-profiler = "0.25.0"
image = { version = "0.25", default-features = false, features = ["png"] }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
rodio = { version = "0.20", features = ["symphonia-all"] }
symphonia = { version = "0.5", features = ["all"] }
winit = "0.30"
egui-winit = "0.29"

[package.metadata.wasm-pack.profile.release]
wasm-opt = false
