[package]
name = "line-dash"
version = "0.1.0"
edition = "2021"
authors = []
description = "Line Dash game engine prototype"

[lib]
name = "line_dash_lib"
crate-type = ["cdylib", "rlib"]

[dependencies]
console_error_panic_hook = "0.1"
wasm-bindgen = "0.2"
wgpu = "0.19"
pollster = "0.3"
env_logger = "0.11"
log = "0.4"
bytemuck = { version = "1.15", features = ["derive"] }
glam = { version = "0.27", features = ["bytemuck"] }
web-sys = { version = "0.3", features = [
    "console",
    "Window",
    "Document",
    "Element",
    "HtmlCanvasElement",
    "EventTarget",
    "Event",
    "MouseEvent",
] }
js-sys = "0.3"
winit = "0.29"
