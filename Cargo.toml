[package]
name = "line-dash"
version = "0.1.0"
edition = "2021"
description = "Feel the beat, follow the line."
repository = "https://github.com/evilbocchi/line-dash"
license = "MIT"

[lib]
name = "line_dash_lib"
crate-type = ["cdylib", "rlib"]

[dependencies]
console_error_panic_hook = "0.1"
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
wgpu = { version = "27.0.1", features = ["webgpu", "webgl"] }
pollster = "0.4"
env_logger = "0.11"
log = "0.4"
bytemuck = { version = "1.25", features = ["derive"] }
glam = { version = "0.32", features = ["bytemuck"] }
web-sys = { version = "0.3", features = [
    "console",
    "Window",
    "Document",
    "Element",
    "HtmlCanvasElement",
    "EventTarget",
    "Event",
    "MouseEvent",
    "WheelEvent",
    "KeyboardEvent",
    "TouchEvent",
    "TouchList",
    "Touch",
    "Performance",
    "HtmlAudioElement",
    "AudioContext",
    "AudioBuffer",
    "DomTokenList",
    "HtmlElement",
    "IdbFactory",
    "IdbDatabase",
    "IdbObjectStore",
    "IdbRequest",
    "IdbOpenDbRequest",
    "IdbTransaction",
    "IdbTransactionMode",
    "DomStringList",
] }
js-sys = "0.3"
web-time = "1.1"
gloo-console = "0.3.0"
gloo-events = "0.2.0"
gloo-file = "0.3.0"
gloo-net = "0.3.1"
gloo-render = "0.2.0"
gloo-utils = "0.2.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
include_dir = "0.7"
zip = { version = "8.1", default-features = false, features = ["deflate"] }
base64 = "0.22"
egui = "0.33"
egui-wgpu = "0.33"
rfd = "0.17"
wgpu-profiler = "0.26.0"
image = { version = "0.25", default-features = false, features = ["png"] }
keyframe = "1.1.1"
async-trait = "0.1"

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
rodio = { version = "0.20", features = ["symphonia-all"] }
symphonia = { version = "0.5", features = ["all"] }
winit = "0.30"
egui-winit = "0.33"
directories = "5.0"

[target.'cfg(target_arch = "wasm32")'.dependencies]
rexie = "0.6"

[package.metadata.wasm-pack.profile.release]
wasm-opt = false
